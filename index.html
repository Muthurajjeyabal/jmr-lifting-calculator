<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JMR Lifting Calculator — Lifting &amp; Rigging Engineering Suite</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12151A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JMR Lifting">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<!-- No external font/CDN dependencies: this app is fully self-contained and works with zero internet connection. -->
<style>
  :root{
    --bg:#12151A;
    --panel:#1B2027;
    --panel2:#232A33;
    --line:#2C3440;
    --yellow:#FFC93C;
    --yellow-dim:#C79A2A;
    --blue:#57B3C9;
    --red:#E4572E;
    --green:#5FB88A;
    --text:#F1EFE6;
    --muted:#8B94A3;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:#0A0C0F;
    color:var(--text);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Noto Sans Tamil','Noto Sans Devanagari',Arial,sans-serif;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

  .app{
    width:100%;
    max-width:460px;
    min-height:100vh;
    background:
      radial-gradient(1200px 400px at 50% -10%, rgba(255,201,60,0.07), transparent 60%),
      var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
  }

  .topbar{
    padding:16px 18px 12px;
    background:linear-gradient(180deg, #171B21 0%, #12151A 100%);
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .tag{
    width:34px;height:34px;
    background:var(--yellow);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    display:flex;align-items:center;justify-content:center;
    color:#12151A; font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif; font-weight:700; font-size:13px;
    flex-shrink:0;
  }
  .brand h1{
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    font-weight:600;
    font-size:16.5px;
    letter-spacing:0.3px;
    margin:0;
    text-transform:uppercase;
    line-height:1.2;
  }
  .brand .sub{
    font-size:11px;
    color:var(--muted);
    margin-top:1px;
    letter-spacing:0.2px;
  }

  .lang-selector{position:relative; margin-left:auto;}
  .lang-btn{
    background:var(--panel2); border:1px solid var(--line); color:var(--text);
    padding:7px 10px; border-radius:16px; font-size:11.5px; font-weight:600;
    cursor:pointer; white-space:nowrap;
  }
  .lang-menu{
    position:absolute; top:calc(100% + 6px); right:0;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    min-width:150px; overflow:hidden; z-index:60;
    box-shadow:0 12px 28px rgba(0,0,0,0.5);
  }
  .lang-menu.hidden{display:none;}
  .lang-menu-item{
    padding:11px 14px; font-size:13px; color:var(--text); cursor:pointer;
    border-bottom:1px solid var(--line);
  }
  .lang-menu-item:last-child{border-bottom:none;}
  .lang-menu-item.active{background:var(--blue); color:#0A0C0F; font-weight:700;}

  .calc-modal-overlay{
    position:fixed; inset:0; background:rgba(5,6,8,0.82);
    display:flex; align-items:center; justify-content:center; padding:18px;
    z-index:100;
  }
  .calc-modal-overlay.hidden{display:none;}
  .calc-modal-box{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:18px; width:100%; max-width:400px;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
  }
  .calc-modal-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .calc-modal-header h3{font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif; font-size:14px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text);}
  .calc-modal-close{background:var(--panel2); border:1px solid var(--line); color:var(--text); width:30px; height:30px; border-radius:8px; font-size:15px; cursor:pointer;}
  .tile-row{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .tile-btn{
    padding:16px 8px; border-radius:14px; border:1px solid var(--line);
    background:var(--panel); color:var(--muted); text-align:center;
    font-weight:700; font-size:12.5px; letter-spacing:0.2px; cursor:pointer;
    text-transform:uppercase;
  }
  .tile-btn .tile-icon{font-size:22px; display:block; margin-bottom:6px;}
  .tile-btn.active{background:var(--yellow); color:#12151A; border-color:var(--yellow);}

  .screen-title{
    margin-top:12px;
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--yellow);
    display:flex; align-items:center; gap:8px;
  }
  .screen-title .num{
    font-family:ui-monospace,'SF Mono','Roboto Mono','Courier New',monospace;
    font-size:11px;
    color:var(--muted);
    border:1px solid var(--line);
    padding:1px 6px;
    border-radius:4px;
  }

  .content{
    flex:1;
    padding:16px 16px 100px;
    overflow-y:auto;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
  }
  .card h3{
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    font-size:14px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    margin:0 0 12px;
    color:var(--text);
    display:flex; align-items:center; gap:8px;
  }
  .field{margin-bottom:12px;}
  .field label{
    display:block;
    font-size:11.5px;
    color:var(--muted);
    margin-bottom:5px;
    letter-spacing:0.2px;
  }
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  input[type="text"], input[type="number"], select, textarea{
    width:100%;
    background:var(--panel2);
    border:1px solid var(--line);
    color:var(--text);
    padding:11px 12px;
    border-radius:9px;
    font-size:14.5px;
    font-family:inherit;
    outline:none;
  }
  textarea{resize:vertical; min-height:76px; font-family:ui-monospace,'SF Mono','Roboto Mono','Courier New',monospace; font-size:13px; line-height:1.5;}
  input:focus, select:focus, textarea:focus{border-color:var(--yellow);}
  input::placeholder{color:#5A6270;}

  .btn{
    width:100%;
    background:var(--yellow);
    color:#12151A;
    border:none;
    padding:13px;
    border-radius:10px;
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
  }
  .btn:active{transform:scale(0.98);}
  .btn.secondary{
    background:transparent;
    border:1px solid var(--line);
    color:var(--text);
  }

  .chips{display:flex; gap:8px; overflow-x:auto; padding:2px 0 4px; margin-bottom:14px; scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    padding:9px 14px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--muted);
    font-size:12.5px;
    font-weight:600;
    white-space:nowrap;
    cursor:pointer;
  }
  .chip.active{ background:var(--yellow); color:#12151A; border-color:var(--yellow);}

  .result-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px;}
  .result{
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 12px;
  }
  .result .k{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px;}
  .result .v{font-family:ui-monospace,'SF Mono','Roboto Mono','Courier New',monospace; font-size:16px; font-weight:600; margin-top:3px; color:var(--yellow);}
  .result .v.blue{color:var(--blue);}
  .result .v.green{color:var(--green);}
  .result .v.red{color:var(--red);}

  .tagcard{
    display:flex; align-items:center; gap:14px;
    background:linear-gradient(135deg, #23180B, #171B21);
    border:1px solid var(--yellow-dim);
    border-radius:12px;
    padding:14px;
    margin:6px 0 14px;
  }
  .diamond{
    width:56px;height:56px; flex-shrink:0;
    background:var(--yellow);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#12151A;
  }
  .diamond .n{font-family:ui-monospace,'SF Mono','Roboto Mono','Courier New',monospace; font-weight:700; font-size:13px;}
  .diamond .u{font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif; font-size:8px; letter-spacing:0.5px;}
  .tagcard .tinfo .t1{font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif; font-size:13px; text-transform:uppercase; letter-spacing:0.5px; color:var(--yellow);}
  .tagcard .tinfo .t2{font-size:12px; color:var(--muted); margin-top:3px; line-height:1.4;}

  .badge{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    padding:4px 9px;
    border-radius:6px;
    letter-spacing:0.4px;
    text-transform:uppercase;
  }
  .badge.routine{background:rgba(95,184,138,0.15); color:var(--green); border:1px solid rgba(95,184,138,0.4);}
  .badge.engineered{background:rgba(255,201,60,0.15); color:var(--yellow); border:1px solid rgba(255,201,60,0.4);}
  .badge.critical{background:rgba(228,87,46,0.15); color:var(--red); border:1px solid rgba(228,87,46,0.4);}

  .warn-list{margin:10px 0 0; padding:0; list-style:none;}
  .warn-list li{
    font-size:12.5px; color:var(--text);
    padding:8px 10px 8px 34px;
    background:var(--panel2);
    border-radius:8px;
    margin-bottom:6px;
    position:relative;
    line-height:1.45;
  }
  .warn-list li::before{
    content:"⚠";
    position:absolute; left:10px; top:7px;
    color:var(--yellow);
  }
  .std-list{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
  .std-list span{
    font-family:ui-monospace,'SF Mono','Roboto Mono','Courier New',monospace; font-size:10.5px;
    border:1px solid var(--line);
    color:var(--blue);
    padding:4px 8px;
    border-radius:6px;
  }

  .divider{height:1px; background:var(--line); margin:14px 0;}
  .hint{font-size:11.5px; color:var(--muted); margin-top:6px; line-height:1.45;}
  .empty{
    text-align:center; padding:40px 20px; color:var(--muted); font-size:13px;
  }

  table.cogtable{width:100%; border-collapse:collapse; margin-bottom:10px;}
  table.datatable{width:100%; border-collapse:collapse; margin-bottom:10px; font-size:11.5px;}
  table.datatable th{font-size:9.5px; color:var(--muted); text-transform:uppercase; text-align:right; padding:5px 4px; border-bottom:1px solid var(--line);}
  table.datatable th:first-child, table.datatable td:first-child{text-align:left;}
  table.datatable td{text-align:right; padding:5px 4px; font-family:ui-monospace,'SF Mono','Roboto Mono','Courier New',monospace; border-bottom:1px solid var(--panel2);}
  .barchart{display:flex; align-items:flex-end; gap:6px; height:150px; padding:10px 4px 0; overflow-x:auto; border-bottom:1px solid var(--line);}
  .barchart-col{display:flex; flex-direction:column; align-items:center; gap:2px; flex:0 0 auto; width:34px;}
  .barchart-bars{display:flex; align-items:flex-end; gap:2px; height:130px;}
  .barchart-bar{width:12px; border-radius:2px 2px 0 0; min-height:2px;}
  .barchart-bar.tail{background:var(--yellow);}
  .barchart-bar.main{background:var(--blue);}
  .barchart-col .lbl{font-size:9px; color:var(--muted);}
  .legend-row{display:flex; gap:14px; margin-top:8px; font-size:11px; color:var(--muted); align-items:center;}
  .legend-dot{width:9px; height:9px; border-radius:2px; display:inline-block; margin-right:5px;}
  .calc-display{background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:16px 14px; text-align:right; font-family:ui-monospace,'SF Mono','Roboto Mono','Courier New',monospace; font-size:26px; margin-bottom:10px; overflow-x:auto; white-space:nowrap; color:var(--yellow); letter-spacing:0.5px;}
  .calc-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:8px;}
  .calc-btn{padding:15px 0; border-radius:10px; background:var(--panel2); border:1px solid var(--line); color:var(--text); font-size:16px; font-weight:600; cursor:pointer; text-align:center; user-select:none;}
  .calc-btn:active{transform:scale(0.96);}
  .calc-btn.op{background:#22303A; color:var(--blue);}
  .calc-btn.eq{background:var(--yellow); color:#12151A; border-color:var(--yellow);}
  .calc-btn.clear{color:var(--red);}
  .calc-btn.fn{font-size:13px; padding:12px 0;}
  .calc-btn.wide{grid-column:span 2;}
  .sci-toggle-btn{margin:0; padding:6px 11px; border-radius:16px; border:1px solid var(--line); background:var(--panel); color:var(--muted); font-size:11px; font-weight:600; cursor:pointer;}
  .sci-toggle-btn.active{background:var(--blue); color:#0A0C0F; border-color:var(--blue);}
  table.cogtable th{font-size:10px; color:var(--muted); text-transform:uppercase; text-align:left; padding-bottom:6px;}
  table.cogtable td{padding:4px 3px;}
  table.cogtable input{padding:8px; font-size:13px;}
  .rm-row{
    background:transparent; border:none; color:var(--red); font-size:16px; cursor:pointer; padding:4px 6px;
  }

  .navbar{
    position:sticky; bottom:0;
    background:rgba(19,22,27,0.97);
    backdrop-filter:blur(6px);
    border-top:1px solid var(--line);
    display:flex;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:30;
  }
  .navbtn{
    flex:1;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    background:none; border:none; color:var(--muted);
    padding:6px 2px; cursor:pointer;
    font-size:10px; font-weight:600;
  }
  .navbtn .ic{font-size:19px; line-height:1;}
  .navbtn.active{color:var(--yellow);}

  code.mono{font-family:ui-monospace,'SF Mono','Roboto Mono','Courier New',monospace; color:var(--yellow);}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="tag">J</div>
      <div>
        <h1>JMR Lifting Calculator</h1>
        <div class="sub" id="brandSub"></div>
      </div>
      <div class="lang-selector">
        <button id="langBtn" class="lang-btn" onclick="toggleLangMenu()">🌐 <span id="langBtnLabel"></span> ▾</button>
        <div id="langMenu" class="lang-menu hidden"></div>
      </div>
    </div>
    <div class="screen-title" id="screenTitle"></div>
  </div>

  <div class="content" id="content"></div>

  <div class="navbar" id="navbar"></div>

  <div class="calc-modal-overlay hidden" id="calcModalOverlay" onclick="closeCalcModalOnBackdrop(event)">
    <div class="calc-modal-box">
      <div class="calc-modal-header">
        <h3 style="margin:0;">🔬 <span id="calcModalTitle"></span></h3>
        <button class="calc-modal-close" onclick="closeCalcModal()">✕</button>
      </div>
      <div id="calcWidget"></div>
    </div>
  </div>
</div>

let calcState = { display:'0', scientific:false, justEvaluated:false };

function sinD(x){ return Math.sin(x*Math.PI/180); }
function cosD(x){ return Math.cos(x*Math.PI/180); }
function tanD(x){ return Math.tan(x*Math.PI/180); }

function calcWidgetHTML(){
  return `

  <div class="calc-grid">
    <div class="calc-btn fn" onclick="calcFn('sinD(')">sin</div>
    <div class="calc-btn fn" onclick="calcFn('cosD(')">cos</div>
    <div class="calc-btn fn" onclick="calcFn('tanD(')">tan</div>
    <div class="calc-btn fn" onclick="calcFn('Math.sqrt(')">√</div>
    <div class="calc-btn fn" onclick="calcFn('Math.log10(')">log</div>
    <div class="calc-btn fn" onclick="calcFn('Math.log(')">ln</div>
    <div class="calc-btn fn" onclick="calcSquare()">x²</div>
    <div class="calc-btn fn" onclick="calcFn('Math.PI')">π</div>
    <div class="calc-btn fn" onclick="calcInput('(')">(</div>
    <div class="calc-btn fn" onclick="calcInput(')')">)</div>
    <div class="calc-btn fn" onclick="calcFn('Math.pow(')">xʸ</div>
    <div class="calc-btn fn" onclick="calcFn('Math.E')">e</div>
  </div>
  <div class="calc-grid">
    <div class="calc-btn clear" onclick="calcClear()">C</div>
    <div class="calc-btn" onclick="calcBackspace()">⌫</div>
    <div class="calc-btn" onclick="calcInput('%')">%</div>
    <div class="calc-btn op" onclick="calcInput('/')">÷</div>

    <div class="calc-btn" onclick="calcInput('7')">7</div>
    <div class="calc-btn" onclick="calcInput('8')">8</div>
    <div class="calc-btn" onclick="calcInput('9')">9</div>
    <div class="calc-btn op" onclick="calcInput('*')">×</div>

    <div class="calc-btn" onclick="calcInput('4')">4</div>
    <div class="calc-btn" onclick="calcInput('5')">5</div>
    <div class="calc-btn" onclick="calcInput('6')">6</div>
    <div class="calc-btn op" onclick="calcInput('-')">−</div>

    <div class="calc-btn" onclick="calcInput('1')">1</div>
    <div class="calc-btn" onclick="calcInput('2')">2</div>
    <div class="calc-btn" onclick="calcInput('3')">3</div>
    <div class="calc-btn op" onclick="calcInput('+')">+</div>

    <div class="calc-btn wide" onclick="calcInput('0')">0</div>
    <div class="calc-btn" onclick="calcInput('.')">.</div>
    <div class="calc-btn eq" onclick="calcEquals()">=</div>
  </div>`;
}
function renderCalcWidget(){
  const el = document.getElementById('calcWidget');
  if(el) el.innerHTML = calcWidgetHTML();
}
function calcInput(val){
  if(calcState.justEvaluated){
    calcState.justEvaluated = false;
    if(/[0-9.]/.test(val)) calcState.display = '';
  }
  if(calcState.display==='0' && /[0-9]/.test(val)) calcState.display = val;
  else if(calcState.display==='0' && val==='.') calcState.display = '0.';
  else calcState.display += val;
  renderCalcWidget();
}
function calcFn(fnToken){
  if(calcState.display==='0' || calcState.justEvaluated){ calcState.display=''; calcState.justEvaluated=false; }
  calcState.display += fnToken;
  renderCalcWidget();
}
function calcSquare(){
  if(calcState.justEvaluated) calcState.justEvaluated = false;
  calcState.display += '**2';
  renderCalcWidget();
}
function calcClear(){
  calcState.display = '0';
  calcState.justEvaluated = false;
  renderCalcWidget();
}
function calcBackspace(){
  calcState.display = calcState.display.length>1 ? calcState.display.slice(0,-1) : '0';
  calcState.justEvaluated = false;
  renderCalcWidget();
}
function calcEquals(){
  try{
    let expr = calcState.display;
    expr = expr.replace(/(\d+(\.\d+)?)%/g, '($1/100)');
    const allowed = /^[0-9+\-*/.() a-zA-Z]*$/;
    if(!allowed.test(expr)) throw new Error('invalid characters');
    const result = Function('"use strict"; return (' + expr + ')')();
    if(typeof result !== 'number' || !isFinite(result)) throw new Error('bad result');
    calcState.display = String(Math.round(result*1e10)/1e10);
    calcState.justEvaluated = true;
  }catch(e){
    calcState.display = 'Error';
    calcState.justEvaluated = true;
  }
  renderCalcWidget();
}

function parseAI(text){
  const tt = text.toLowerCase();
  const num = (re) => { const m = tt.match(re); return m ? parseFloat(m[1]) : null; };

  const weight = num(/(\d+(?:\.\d+)?)\s*(?:ton|tonne|te|t|டன்|टन|toneladas?)\b/);
  const legs   = num(/(\d+)\s*[- ]?leg/) ?? num(/(\d+)\s*sling/) ?? num(/(\d+)\s*லெக்/) ?? num(/(\d+)\s*ஸ்லிங்/) ?? num(/(\d+)\s*लेग/) ?? num(/(\d+)\s*स्लिंग/) ?? num(/(\d+)\s*cinta/) ?? num(/(\d+)\s*(?:élingue|brin)/);
  const angle  = num(/(\d+(?:\.\d+)?)\s*(?:°|deg|degree)/);
  const radius = num(/(\d+(?:\.\d+)?)\s*m\s*radius/) ?? num(/radius\s*(?:of\s*)?(\d+(?:\.\d+)?)\s*m/);
  const capacity = num(/capacity\s*(?:of\s*)?(\d+(?:\.\d+)?)\s*(?:ton|t)\b/) ?? num(/rated\s*(?:capacity\s*)?(\d+(?:\.\d+)?)\s*(?:ton|t)\b/);
  const offshore = /offshore|vessel|barge|platform|marine/.test(tt);

  return {weight, legs, angle, radius, capacity, offshore};
}

function runAI(){
  const raw = document.getElementById('aiInput').value;
  const p = parseAI(raw);
  const out = document.getElementById('aiResult');

  if(!p.weight){
    out.innerHTML = `<div class="card"><div class="empty">${t('ai_no_weight')}<br><span class="mono">"25 ton load, 4 leg sling, 60° angle"</span></div></div>`;
    return;
  }

  const legs = p.legs || 4;
  const angle = p.angle || 60;
  const W = p.weight;
  const af = angleFactor(angle);
  const tensionPerLeg = (W/legs)*af;
  const conservativeLegs = legs===4 ? 3 : legs;
  const tensionConservative = (W/conservativeLegs)*af;
  const reqWLL = Math.max(tensionPerLeg, tensionConservative);
  const shackle = pickShackle(reqWLL);

  let utilPct = null;
  if(p.capacity){ utilPct = (W/p.capacity)*100; }
  const cat = liftCategory(utilPct);

  const warnings = [];
  if(angle < 45) warnings.push(t('warning_angle',{angle:angle}));
  if(legs===4) warnings.push(t('warning_4leg'));
  if(p.radius && !p.capacity) warnings.push(t('warning_radius_no_capacity',{radius:p.radius}));
  if(utilPct !== null && utilPct > 75) warnings.push(t('warn_critical_lift'));
  warnings.push(t('warning_disclaimer'));

  const standards = ['ASME B30.9', 'ASME B30.26', 'ASME B30.5', 'OSHA 1926.1400'];
  if(p.offshore || p.radius) standards.push('DNV-ST-N001');
  if(utilPct !== null && utilPct>75) standards.push('API RP 2D');

  out.innerHTML = `
    <div class="tagcard">
      <div class="diamond"><div class="n">${reqWLL.toFixed(2)}</div><div class="u">T / LEG WLL</div></div>
      <div class="tinfo">
        <div class="t1">${t('ai_tag_title')}</div>
        <div class="t2">${t('ai_tag_sub',{legs:legs, angle:angle, W:W})}</div>
      </div>
    </div>

    <div class="card">
      <h3>${t('ai_report_title')}</h3>
      <div class="result-grid">
        <div class="result"><div class="k">${t('result_tension_share')}</div><div class="v">${tensionPerLeg.toFixed(2)} t</div></div>
        <div class="result"><div class="k">${t('result_tension_cons')}</div><div class="v blue">${tensionConservative.toFixed(2)} t</div></div>
        <div class="result"><div class="k">${t('result_wll')}</div><div class="v">${reqWLL.toFixed(2)} t</div></div>
        <div class="result"><div class="k">${t('result_shackle')}</div><div class="v green">${shackle.size}</div></div>
        ${utilPct!==null ? `<div class="result"><div class="k">${t('result_util')}</div><div class="v ${utilPct>75?'red':utilPct>50?'':'green'}">${utilPct.toFixed(1)}%</div></div>` : `<div class="result"><div class="k">${t('result_util')}</div><div class="v" style="color:var(--muted); font-size:12px;">${t('util_placeholder')}</div></div>`}
        <div class="result"><div class="k">${t('result_category')}</div><div class="v" style="font-size:13px;">${cat ? `<span class="badge ${cat.cls}">${cat.label}</span>` : `<span style="color:var(--muted); font-size:12px;">${t('category_placeholder')}</span>`}</div></div>
      </div>

      <div class="divider"></div>
      <h3 style="margin-bottom:8px;">${t('ai_warnings_title')}</h3>
      <ul class="warn-list">${warnings.map(w=>`<li>${w}</li>`).join('')}</ul>

      <div class="divider"></div>
      <h3 style="margin-bottom:2px;">${t('ai_standards_title')}</h3>
      <div class="std-list">${standards.map(s=>`<span>${s}</span>`).join('')}</div>
    </div>
  `;
}

function calcSling(){
  const W = parseFloat(document.getElementById('s_w').value);
  const n = parseInt(document.getElementById('s_n').value);
  const a = parseFloat(document.getElementById('s_a').value);
  if(!W || !n || !a){ document.getElementById('s_out').innerHTML=''; return; }
  const af = angleFactor(a);
  const tension = (W/n)*af;
  const conservativeN = n===4 ? 3 : n;
  const tensionCons = (W/conservativeN)*af;
  document.getElementById('s_out').innerHTML = `
  <div class="card">
    <div class="result-grid">

      ${rows.map((r,i)=>`
        <tr>
          <td><input type="number" value="${r.w}" onchange="updCog(${i},'w',this.value)"></td>
          <td><input type="number" value="${r.x}" onchange="updCog(${i},'x',this.value)"></td>
          <td><input type="number" value="${r.y}" onchange="updCog(${i},'y',this.value)"></td>
          <td><input type="number" value="${r.z}" onchange="updCog(${i},'z',this.value)"></td>

function updCog(i,k,v){ cogState()[i][k]=parseFloat(v)||0; }
function addCog(){ cogState().push({w:0,x:0,y:0,z:0}); render(); }
function rmCog(i){ cogState().splice(i,1); render(); }
function calcCog(){
  const rows = cogState();
  const totalW = rows.reduce((s,r)=>s+r.w,0);
  if(!totalW){ document.getElementById('cog_out').innerHTML=''; return; }
  const cx = rows.reduce((s,r)=>s+r.w*r.x,0)/totalW;
  const cy = rows.reduce((s,r)=>s+r.w*r.y,0)/totalW;
  const cz = rows.reduce((s,r)=>s+r.w*r.z,0)/totalW;
  document.getElementById('cog_out').innerHTML = `
  <div class="card">
    <div class="result-grid">
      <div class="result"><div class="k">${t('result_total_weight')}</div><div class="v">${totalW.toFixed(0)} kg</div></div>

    </div>
  </div>`;
}

function calcTailing(){
  const w=parseFloat(document.getElementById('tl_w').value);
  const cg=parseFloat(document.getElementById('tl_cg').value);
  const tail=parseFloat(document.getElementById('tl_t').value);
  const a=parseFloat(document.getElementById('tl_a').value);
  if(!w||!cg||!tail){ document.getElementById('tl_out').innerHTML=''; return; }
  const tailingLoad = w*(cg/tail)*Math.cos(a*Math.PI/180);
  const mainLoad = w - tailingLoad*0.15;
  document.getElementById('tl_out').innerHTML = `
  <div class="card">
    <div class="result-grid">
      <div class="result"><div class="k">${t('result_tailing_load')}</div><div class="v">${Math.max(tailingLoad,0).toFixed(2)} t</div></div>
      <div class="result"><div class="k">${t('result_main_load')}</div><div class="v blue">${mainLoad.toFixed(2)} t</div></div>
    </div>
  </div>`;
}
function calcTailingTable(){
  const w=parseFloat(document.getElementById('tl_w').value);
  const cg=parseFloat(document.getElementById('tl_cg').value);
  const tail=parseFloat(document.getElementById('tl_t').value);
  const out = document.getElementById('tl_table_out');
  if(!w||!cg||!tail){ out.innerHTML=''; return; }

  const rows = [];
  for(let a=0; a<=90; a+=10){
    const af = Math.cos(a*Math.PI/180);
    const tailing = Math.max(w*(cg/tail)*af, 0);
    const main = w - tailing*0.15;
    rows.push({a, tailing, main});
  }
  const maxVal = Math.max(...rows.map(r=>Math.max(r.tailing, r.main)), 1);

  const bars = rows.map(r => `
    <div class="barchart-col">
      <div class="barchart-bars">
        <div class="barchart-bar tail" style="height:${(r.tailing/maxVal*130).toFixed(0)}px" title="${r.tailing.toFixed(2)} t"></div>
        <div class="barchart-bar main" style="height:${(r.main/maxVal*130).toFixed(0)}px" title="${r.main.toFixed(2)} t"></div>
      </div>
      <div class="lbl">${r.a}°</div>
    </div>`).join('');

  const tableRows = rows.map(r => `
    <tr>
      <td>${r.a}°</td>
      <td>${r.tailing.toFixed(2)}</td>
      <td>${r.main.toFixed(2)}</td>
    </tr>`).join('');

  out.innerHTML = `
  <div class="card">
    <h3 style="margin-bottom:4px;">${t('chart_title')}</h3>
    <div class="barchart">${bars}</div>
    <div class="legend-row">
      <span><span class="legend-dot" style="background:var(--yellow);"></span>${t('result_tailing_load')}</span>
      <span><span class="legend-dot" style="background:var(--blue);"></span>${t('result_main_load')}</span>
    </div>
    <div class="divider"></div>
    <table class="datatable">
      <tr><th>${t('table_angle')}</th><th>${t('table_tailing')}</th><th>${t('table_main')}</th></tr>
      ${tableRows}
    </table>
    <div class="hint">${t('tl_hint')}</div>
  </div>`;
}

/* --- Padeye Check --- */
function padeyeForm(){
  return `
  <div class="card">
    <h3>${t('pe_title')}</h3>
    <div class="row2">
      <div class="field"><label>${t('label_required_wll')}</label><input type="number" id="pe_w" value="15"></div>
      <div class="field"><label>${t('label_plate_thickness')}</label><input type="number" id="pe_t" value="25"></div>
    </div>
    <div class="row2">
      <div class="field"><label>${t('label_hole_dia')}</label><input type="number" id="pe_h" value="52"></div>
      <div class="field"><label>${t('label_pin_dia')}</label><input type="number" id="pe_p" value="50"></div>
    </div>
    <div class="row2">
      <div class="field"><label>${t('label_edge_dist')}</label><input type="number" id="pe_e" value="60"></div>
      <div class="field"><label>${t('label_plate_width')}</label><input type="number" id="pe_pw" value="180"></div>
    </div>
    <div class="field"><label>${t('label_yield_strength')}</label><input type="number" id="pe_y" value="250"></div>
    <button class="btn" onclick="calcPadeye()">${t('btn_calc_padeye')}</button>
    <div class="hint">${t('pe_hint')}</div>
  </div>
  <div id="pe_out"></div>`;
}
function calcPadeye(){
  const w=parseFloat(document.getElementById('pe_w').value);
  const th=parseFloat(document.getElementById('pe_t').value);
  const hd=parseFloat(document.getElementById('pe_h').value);
  const pd=parseFloat(document.getElementById('pe_p').value);
  const ed=parseFloat(document.getElementById('pe_e').value);
  const pw=parseFloat(document.getElementById('pe_pw').value);
  const fy=parseFloat(document.getElementById('pe_y').value);
  if(!w||!th||!hd||!pd||!ed||!pw||!fy){ document.getElementById('pe_out').innerHTML=''; return; }
  const loadN = w*1000*9.81;
  const bearingStress = loadN/(pd*th);
  const allowBearing = 0.9*fy;
  const tearArea = 2*th*(ed-hd/2);
  const tearStress = loadN/tearArea;
  const allowShear = 0.4*fy;
  const netArea = th*(pw-hd);
  const tensileStress = loadN/netArea;
  const allowTensile = 0.6*fy;
  const bU=(bearingStress/allowBearing)*100, tU=(tearStress/allowShear)*100, nU=(tensileStress/allowTensile)*100;
  const overall = Math.max(bU,tU,nU) <= 100;
  document.getElementById('pe_out').innerHTML = `
  <div class="tagcard">
    <div class="diamond" style="background:${overall?'var(--green)':'var(--red)'}"><div class="n" style="font-size:10px;">${overall?t('check_pass'):t('check_fail')}</div></div>
    <div class="tinfo"><div class="t1">${overall?t('check_pass'):t('check_fail')}</div><div class="t2">${t('pe_title')}</div></div>
  </div>
  <div class="card">
    <div class="result-grid">
      <div class="result"><div class="k">${t('result_bearing_stress')}</div><div class="v">${bearingStress.toFixed(1)} MPa</div></div>
      <div class="result"><div class="k">${t('result_bearing_util')}</div><div class="v ${bU>100?'red':'green'}">${bU.toFixed(0)}%</div></div>
      <div class="result"><div class="k">${t('result_tearout_stress')}</div><div class="v">${tearStress.toFixed(1)} MPa</div></div>
      <div class="result"><div class="k">${t('result_tearout_util')}</div><div class="v ${tU>100?'red':'green'}">${tU.toFixed(0)}%</div></div>
      <div class="result"><div class="k">${t('result_tensile_stress')}</div><div class="v">${tensileStress.toFixed(1)} MPa</div></div>
      <div class="result"><div class="k">${t('result_tensile_util')}</div><div class="v ${nU>100?'red':'green'}">${nU.toFixed(0)}%</div></div>
    </div>
  </div>`;
}

function calcSlingLength(){
  const s=parseFloat(document.getElementById('sl_s').value);

  document.getElementById('sl_out').innerHTML = `
  <div class="card">
    <div class="result-grid">
      <div class="result"><div class="k">${t('result_leg_length')}</div><div class="v">${leg.toFixed(2)} m</div></div>

}

function calcBoomClear(){
